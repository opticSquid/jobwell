services:
  qdrant:
    build:
      context: ./docker/qdrant
      dockerfile: qdrant.Dockerfile
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 7s
      retries: 5

volumes:
  qdrant_data:
    driver: local
